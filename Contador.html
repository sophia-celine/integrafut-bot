<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrafut - Contador de Pontos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 { text-align: center; color: var(--dark); font-size: 1.5rem; }
        .upload-area {
            border: 2px dashed #ccc;
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            margin: 1rem 0;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); }
        input[type="file"] { display: none; }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-copy { background-color: var(--success); color: white; }
        .btn-process { background-color: var(--primary); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #report-output {
            width: 100%;
            height: 300px;
            margin-top: 1.5rem;
            padding: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: var(--light);
            white-space: pre-wrap;
            display: none;
        }
        .status { margin-top: 10px; font-size: 0.9rem; text-align: center; }
        .alerts {
            margin-top: 15px;
            color: var(--danger);
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Contador Integrafut</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p id="fileName">Toque aqui para selecionar o ZIP da conversa</p>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <button id="processBtn" class="btn-process" disabled>Gerar Relatório</button>
    
    <div id="status" class="status"></div>

    <div id="result-container" style="display:none;">
        <textarea id="report-output" readonly></textarea>
        <button id="copyBtn" class="btn-copy">Copiar para Área de Transferência</button>
        <div id="alerts" class="alerts"></div>
    </div>
</div>

<script>
    // Configurações (Espelhando o checkMessages.py)
    const GROUP_NAME = "Gugu Integrafut 2026";
    const DAYS_LIMIT = 7;

    const CHALLENGE_PATTERN = /DESAFIO (DO GUGU GERAL|MUSICAL)/i;
    const POINT_PATTERN = /(\d+(?:[.,]\d+)?)\s+pontos?\s+(azul|amarelo)/gi;
    const ITEM_PATTERN = /(?:^|[\s\*\_\~\u200b\u200c\u200d\u2068\u2069]+)(M?)(\d+)\.(?![0-9])[\s\u200b\u200c\u200d\u2068\u2069]*/gim;
    const MSG_PATTERN = /^\[?(\d{2}\/\d{2}\/\d{4}[,\s]\s*\d{2}:\d{2})\]?\s*-\s*([^:]+):\s*(.*)$/;

    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const processBtn = document.getElementById('processBtn');
    const reportOutput = document.getElementById('report-output');
    const status = document.getElementById('status');
    const alertsDiv = document.getElementById('alerts');
    const resultContainer = document.getElementById('result-container');

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileNameDisplay.innerText = e.target.files[0].name;
            processBtn.disabled = false;
        }
    });

    processBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        status.innerText = "Processando arquivo...";
        alertsDiv.innerHTML = "";
        
        try {
            const zip = await JSZip.loadAsync(file);
            const txtFile = Object.values(zip.files).find(f => f.name.endsWith('.txt'));
            
            if (!txtFile) {
                throw new Error("Nenhum arquivo .txt encontrado no ZIP.");
            }

            const content = await txtFile.async("string");
            const lines = content.split(/\r?\n/);
            
            processChat(lines);
        } catch (err) {
            status.innerText = "Erro: " + err.message;
        }
    });

    function processChat(lines) {
        const cutoffDate = new Date();
        cutoffDate.setDate(cutoffDate.getDate() - DAYS_LIMIT);
        cutoffDate.setHours(0,0,0,0);

        let results = {};
        let currentChallenge = null;
        let lastMsgTs = "Nenhuma mensagem encontrada";

        let currentMsg = { text: "", ts: "", sender: "", raw: [] };

        function flushMessage() {
            if (!currentMsg.text) return;

            // Verifica troca de desafio (Geral vs Musical) pelo prefixo "M"
            let itemMatch;
            ITEM_PATTERN.lastIndex = 0;
            while ((itemMatch = ITEM_PATTERN.exec(currentMsg.text)) !== null) {
                const prefix = itemMatch[1].toUpperCase();
                currentChallenge = (prefix === 'M') ? "DESAFIO MUSICAL" : "DESAFIO DO GUGU GERAL";
                if (!results[currentChallenge]) {
                    results[currentChallenge] = { azul: 0, amarelo: 0 };
                }
            }

            if (!currentChallenge) return;

            // Busca pontos
            let pointsMatch;
            POINT_PATTERN.lastIndex = 0; // Reset regex
            while ((pointsMatch = POINT_PATTERN.exec(currentMsg.text)) !== null) {
                const ptsVal = parseFloat(pointsMatch[1].replace(',', '.'));
                const team = pointsMatch[2].toLowerCase();
                results[currentChallenge][team] += ptsVal;
                lastMsgTs = currentMsg.ts;
            }

            currentMsg = { text: "", ts: "", sender: "", raw: [] };
        }

        for (let line of lines) {
            const match = line.match(MSG_PATTERN);
            if (match) {
                flushMessage();
                const [_, ts, sender, message] = match;
                
                // Validação simples de data
                const day = parseInt(ts.substring(0,2));
                const month = parseInt(ts.substring(3,5)) - 1;
                const year = parseInt(ts.substring(6,10));
                const msgDate = new Date(year, month, day);

                if (msgDate < cutoffDate) continue;

                const challengeMatch = message.match(CHALLENGE_PATTERN);
                if (challengeMatch) {
                    currentChallenge = `DESAFIO ${challengeMatch[1].toUpperCase()}`;
                    if (!results[currentChallenge]) {
                        results[currentChallenge] = { azul: 0, amarelo: 0 };
                    }
                }

                if (currentChallenge) {
                    currentMsg = { text: message, ts: ts, sender: sender.trim(), raw: [line] };
                }
            } else if (currentMsg.ts) {
                currentMsg.text += "\n" + line;
            }
        }
        flushMessage();

        generateReport(results, lastMsgTs);
    }

    function generateReport(results, lastTs) {
        let report = `RELATÓRIO DE COMPETIÇÃO - GRUPO: ${GROUP_NAME}\n`;
        report += `Período de análise: últimos ${DAYS_LIMIT} dias\n`;
        report += `Última mensagem computada em: ${lastTs}\n`;
        report += "-".repeat(50) + "\n\n";

        let totalAzul = 0, totalAmarelo = 0;

        for (const [desafio, scores] of Object.entries(results)) {
            report += `\n=== ${desafio} ===\n`;
            report += `Pontuação Azul: ${scores.azul}\n`;
            report += `Pontuação Amarela: ${scores.amarelo}\n`;
            
            totalAzul += scores.azul;
            totalAmarelo += scores.amarelo;
        }

        report += "\n" + "=".repeat(50) + "\n";
        report += `PONTUAÇÃO ATÉ AGORA:\n`;
        report += `EQUIPE AZUL: ${totalAzul}\n`;
        report += `EQUIPE AMARELA: ${totalAmarelo}\n`;

        reportOutput.value = report;
        reportOutput.style.display = "block";
        resultContainer.style.display = "block";
        status.innerText = "Análise concluída!";
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
        reportOutput.select();
        document.execCommand('copy');
        alert("Relatório copiado!");
    });
</script>

</body>
</html>
